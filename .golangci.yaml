version: "2"

run:
  timeout: 5m

linters:
  enable:
    - errorlint
    - wastedassign
    - errcheck
    - ineffassign
    - dogsled
    - misspell
    - goconst
    - nakedret
    - nolintlint
    - gocritic
    - unparam
    - unconvert
    - unused
    - gocyclo
    - exhaustive
  settings:
    errcheck:
      exclude-functions:
        - (io.Closer).Close
        - (*os.File).Close
    gocyclo:
      min-complexity: 15

  exclusions:
    rules:
      # Test helpers where the parameter is always "git" by design.
      - path: _test\.go
        linters: [unparam, goconst]
